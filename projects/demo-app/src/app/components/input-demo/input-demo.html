<div class="container-fluid">

  <div class="row">

    <!-- LEFT: Preview -->
    <div class="col-md-8 p-4 border">

      <h5>Modifiers</h5>

      <div class="preview-box">
        <lib-input
          [placeholder]="placeholder"
          [disabled]="state === 'disabled'"
          [state]="state">
        </lib-input>
      </div>

    </div>

    <!-- RIGHT: State -->
    <div class="col-md-4 p-4 border">

      <h6>State</h6>

      <div *ngFor="let s of states">
        <input 
          type="radio"
          name="state"
          [value]="s"
          (change)="changeState(s)"
          [checked]="state === s"
        />
        {{s}}
      </div>

    </div>

  </div>

  <!-- CODE -->
  <div class="row mt-3">
    <div class="col-12 border p-3">

      <div class="d-flex justify-content-between">
        <h6>Code</h6>
        <button class="btn btn-sm btn-primary" (click)="copyCode()">
          Copy
        </button>
      </div>

      <pre>{{ code }}</pre>

    </div>
  </div>

</div>
