<div class="container-fluid">

  <div class="row">

    <!-- LEFT -->
    <div class="col-md-8 p-4 border-end">

      <h5 class="mb-3">Modifiers</h5>

      <div class="preview-box">

        <form [formGroup]="inputForm">

          <lib-input
            #inputRef
            formControlName="inputText"

            [ngClass]="(f?.touched && f?.errors) || state === 'error' ? 'error' : ''"

            [swClass]="inputClassName"
            [swPlaceholder]="placeholder"
            [swIsDisable]="swIsDisable"
            [swReadOnlyProperties]="swReadOnlyProperties"
            [swDefaultValue]="swDefaultValue"
            [swType]="type"
            [maxLength]="maxLength"
            [minLength]="minLength"
            [swIsShowIcon]="swIsShowIcon"
            [swIconClass]="swIconClass"
            [swIsShowLoader]="swIsShowLoader"
            [swAutocomplete]="swAutocomplete"
            [locator]="locator"

            (valueChange)="onValueChange($event)"
            (focusEvent)="onFocus($event)"
            (blurEvent)="onBlur($event)"
            (keyupEvent)="onKeyUp($event)"
            (enterEvent)="onEnter($event)"
            (keypressEvent)="onKeyPress($event)"

          ></lib-input>

        </form>
      </div>

    </div>

    <!-- RIGHT -->
    <div class="col-md-4 p-4">

      <h6 class="mb-3">State</h6>

      <div *ngFor="let s of states" class="form-check mb-2">
        <input 
          class="form-check-input"
          type="radio"
          name="state"
          [value]="s"
          (change)="changeState(s)"
          [checked]="state === s"
        />
        <label class="form-check-label">{{ s }}</label>
      </div>

    </div>

  </div>

  <!-- CODE -->
  <div class="row mt-3">
    <div class="col-12 border rounded p-3 code-box">

      <div class="d-flex justify-content-between align-items-center mb-2">
      <h6>Code</h6>
      <button 
        class="btn btn-sm btn-primary" 
        (click)="copyCode()" 
        [title]="copyStatus"> 
        {{ copyStatus === 'Copied!' ? 'Copied!' : 'Copy' }}
      </button>
    </div>

      <pre><code>{{ textOutput }}</code></pre>

    </div>
  </div>

</div>
