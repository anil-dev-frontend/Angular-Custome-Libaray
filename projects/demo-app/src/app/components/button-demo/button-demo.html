<div class="content-wrapper">
  <div class="page-header mb-4">
    <h2 class="page-title">Button</h2>
    <p class="page-description">A button triggers an event or action.</p>
  </div>

  <ul class="nav swire-tabs mb-4">
    <li class="nav-item">
      <a class="nav-link active" href="javascript:void(0)">Code</a>
    </li>
    <li class="nav-item">
      <a class="nav-link" href="javascript:void(0)">Usage</a>
    </li>
  </ul>

  <div class="row g-4">
    <div class="col-lg-8">
      <div class="main-card preview-card">
        <div class="preview-header d-flex gap-3 mb-4">
          <select class="form-select custom-select" [(ngModel)]="color" (ngModelChange)="updateCode()">
            <option value="red">Red</option>
            <option value="grey-red">Grey Red</option>
            <option value="blue">Blue</option>
            <option value="gray-blue">Gray Blue</option>
            <option value="white">White</option>
          </select>

          <select class="form-select custom-select" [(ngModel)]="iconPosition" (ngModelChange)="updateCode()">
            <option value="none">Regular</option>
            <option value="left">Left Icon</option>
            <option value="right">Right Icon</option>
          </select>
        </div>

        <div class="button-preview-area d-flex justify-content-center align-items-center">
          <lib-button 
            [label]="'Button'" 
            [color]="color" 
            [size]="size" 
            [state]="state"
            [iconPosition]="iconPosition" 
            [icon]="icon">
          </lib-button>
        </div>

        <div class="code-section mt-4">
          <div class="code-box-header">
           <span>Code Example</span>

          <lib-copy-button [text]="code"></lib-copy-button>

           </div>
          <div class="code-content">
            <pre><code>{{ code }}</code></pre>
          </div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="main-card control-card">
        <div class="control-group mb-4">
          <h6 class="control-title">State</h6>
          <div class="form-check custom-radio" *ngFor="let s of ['default', 'hover', 'active', 'disabled']">
            <input class="form-check-input" type="radio" [id]="s" [(ngModel)]="state" [value]="s">
            <label class="form-check-label text-capitalize" [for]="s">{{s}}</label>
          </div>
        </div>

        <hr class="divider">

        <div class="control-group">
          <h6 class="control-title">Size</h6>
          <div class="form-check custom-radio" *ngFor="let sz of ['large', 'medium', 'small']">
            <input class="form-check-input" type="radio" [id]="sz" [(ngModel)]="size" [value]="sz">
            <label class="form-check-label text-capitalize" [for]="sz">{{sz}}</label>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
